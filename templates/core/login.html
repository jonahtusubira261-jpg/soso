{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-8 md:p-12 bg-white rounded-[2.5rem] shadow-sm border border-slate-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-slate-900 italic">Welcome Back</h2>
        <p class="text-slate-400 text-sm mt-2">Enter the Wild West of Trade.</p>
    </div>

    <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div class="space-y-4">
            {% for field in form %}
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
        </div>

        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-slate-800 transition transform active:scale-95 mt-4">
            Sign In
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-50 text-center">
        <p class="text-sm text-slate-500">New trader? 
            <a href="{% url 'signup' %}" class="text-indigo-600 font-bold hover:underline">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
