{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8">
    <h1 class="text-3xl font-black mb-6">Welcome back to <span class="text-indigo-600">SOSO.</span></h1>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        {% for field in form %}
        <div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p class="text-red-500 text-[10px] italic mt-1">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-2xl font-black text-sm hover:bg-indigo-700 transition">
            LOG IN
        </button>
        
        <p class="text-center text-sm text-slate-500">
            Don't have an account? 
            <a href="{% url 'core:signup' %}" class="text-indigo-600 font-bold hover:underline">Create Account</a>
        </p>
    </form>
</div>
{% endblock %}
