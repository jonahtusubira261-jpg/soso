{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-8 md:p-12 bg-white rounded-[2.5rem] shadow-sm border border-slate-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-indigo-600 italic">Join Soso</h2>
        <p class="text-slate-400 text-sm mt-2">Start trading goods and services today.</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">
                    {{ field.label }}
                </label>
                <div class="relative">
                    {{ field }}
                </div>
                {% if field.errors %}
                    <p class="text-red-500 text-[10px] italic">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        
        <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-indigo-700 transition transform active:scale-95 mt-4">
            Create Account
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-50 text-center">
        <p class="text-sm text-slate-500">Already a trader? 
            <a href="{% url 'login' %}" class="text-indigo-600 font-bold hover:underline">Log In</a>
        </p>
    </div>
</div>
{% endblock %}
