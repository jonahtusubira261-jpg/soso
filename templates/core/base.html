<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <title>SOSO | Trade & Negotiate</title>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <a href="{% url 'core:index' %}" class="text-3xl font-black italic tracking-tighter text-indigo-600">SOSO.</a>
        
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-6 font-bold text-sm text-slate-500">
                <a href="{% url 'core:index' %}" class="hover:text-indigo-600 transition">Market</a>
                <a href="{% url 'core:group_list' %}" class="hover:text-indigo-600 transition">Trade Groups</a>
            </div>

            <a href="{% url 'core:cart_detail' %}" class="relative bg-slate-100 p-3 rounded-2xl hover:bg-indigo-50 transition group">
                <i class="fa-solid fa-cart-shopping text-slate-600 group-hover:text-indigo-600"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-indigo-600 text-white text-[10px] font-black min-w-[20px] h-5 px-1 flex items-center justify-center rounded-full shadow-lg border-2 border-white transition-transform duration-200">
                    {{ request.user.cart.items.count|default:0 }}
                </span>
            </a>

            {% if request.user.is_authenticated %}
                <div class="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-100">
                    {{ request.user.username|slice:":1"|upper }}
                </div>
            {% else %}
                <a href="{% url 'core:login' %}" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold text-sm">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <div id="cart-toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl translate-y-24 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span class="text-sm font-bold">Added to your bundle!</span>
    </div>
</body>
</html>
