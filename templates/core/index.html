{% extends 'core/base.html' %}
{% block content %}

<div class="w-full h-48 md:h-80 rounded-[2.5rem] bg-gradient-to-r from-indigo-900 via-indigo-600 to-purple-600 relative overflow-hidden mb-10 shadow-xl shadow-indigo-100">
    <div class="absolute inset-0 flex items-center p-8 md:p-16 text-white z-10">
        <div class="max-w-lg">
            <span class="bg-white/20 backdrop-blur-md px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-widest">Live Now</span>
            <h2 class="text-3xl md:text-5xl font-black mt-4 leading-tight">Trade Goods & <br>Services Instantly</h2>
            <button class="mt-6 bg-white text-indigo-600 px-8 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition">Explore Now</button>
        </div>
    </div>
    <i class="fa-solid fa-bolt absolute -right-10 -bottom-10 text-white/10 text-[200px] rotate-12"></i>
</div>

<div class="flex items-center justify-between mb-8 px-2">
    <h3 class="text-2xl font-black text-slate-800 italic uppercase tracking-tighter">Featured Listings</h3>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-4 md:gap-6 px-2">
    {% for item in listings %}
    <div class="group bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm hover:shadow-xl hover:shadow-indigo-100 transition-all duration-300">
        <a href="{% url 'core:product_detail' item.pk %}">
            <div class="relative h-40 md:h-48 overflow-hidden bg-slate-100">
                {% if item.image %}
                    <img src="{{ item.image.url }}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                {% else %}
                    <div class="w-full h-full flex items-center justify-center text-slate-300"><i class="fa-solid fa-image text-2xl"></i></div>
                {% endif %}
            </div>
        </a>

        <div class="p-4">
            <p class="text-[10px] text-slate-400 font-bold uppercase truncate">{{ item.category.name }}</p>
            <h4 class="font-bold text-slate-800 truncate text-sm mt-1">{{ item.title }}</h4>
            <div class="flex justify-between items-center mt-3">
                <span class="text-indigo-600 font-black text-base">${{ item.price }}</span>
            </div>
            
            <button onclick="addToCart(event, '{{ item.id }}')" class="w-full bg-slate-900 text-white text-center py-2.5 rounded-xl font-bold text-[11px] mt-3 hover:bg-indigo-600 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-plus"></i> Add to Bundle
            </button>
        </div>
    </div>
    {% endfor %}
</div>

<script>
function addToCart(event, itemId) {
    event.preventDefault();
    const url = `/add-to-cart/${itemId}/`;

    fetch(url, {
        method: 'GET',
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'ok') {
            // Update Navbar Badge
            const badge = document.getElementById('cart-badge');
            badge.innerText = data.cart_count;
            badge.classList.add('scale-125', 'bg-green-500');
            
            // Show Toast
            const toast = document.getElementById('cart-toast');
            toast.classList.remove('translate-y-24', 'opacity-0');
            
            setTimeout(() => {
                badge.classList.remove('scale-125', 'bg-green-500');
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 2000);
        }
    })
    .catch(error => console.error('Error:', error));
}
</script>
{% endblock %}
